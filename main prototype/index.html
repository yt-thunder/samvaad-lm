<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <title>Admin Login</title>
    <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect" />
    <link as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" onload="this.rel='stylesheet'" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6f7f8;
        }
        .dark body {
            background-color: #101922;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .dark .login-container {
            background-color: #1a2938;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .login-container:hover {
            transform: translateY(-5px);
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #101922;
            text-align: center;
            margin-bottom: 10px;
        }
        .dark h1 {
            color: #ffffff;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 30px;
        }
        .dark p {
            color: #9ca3af;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }
        .dark label {
            color: #d1d5db;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background-color: #f9fafb;
            color: #101922;
            transition: all 0.3s ease;
        }
        .dark input[type="text"],
        .dark input[type="password"] {
            background-color: #2d3748;
            border-color: #4a5568;
            color: #ffffff;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #137fec;
            box-shadow: 0 0 0 3px rgba(19, 127, 236, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background-color: #137fec;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(19, 127, 236, 0.3);
        }
        .btn-login:hover {
            background-color: #0b69c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(19, 127, 236, 0.4);
        }
        .extra-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .remember-me {
            display: flex;
            align-items: center;
        }
        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
        }
        .remember-me label {
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
        }
        .dark .remember-me label {
            color: #9ca3af;
        }
        .forgot-password a {
            font-size: 14px;
            color: #137fec;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .forgot-password a:hover {
            color: #0b69c4;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="./pictures/icon.png" alt="Logo" class="logo">
        <h1>Welcome to Samvaad LM</h1>
        <p>Admin Login</p>
        <form id="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
            <div class="extra-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
