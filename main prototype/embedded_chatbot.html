<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #college-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #chatbot {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="college-site"></iframe>
    <div id="chatbot-container">
        <iframe id="chatbot" src="chatbot.html"></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const siteUrl = urlParams.get('site');

        if (siteUrl) {
            document.getElementById('college-site').src = siteUrl;
        } else {
            document.body.innerHTML = '<h1>Error: No site URL provided.</h1>';
        }
    </script>
</body>
</html>
